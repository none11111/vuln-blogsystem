<!DOCTYPE html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>{% block title %}TechBlog{% endblock %}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f5f3ff}.navbar{background:white;border-bottom:1px solid #e0e0e0;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}.nav-brand a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#667eea;font-weight:700;font-size:20px}.nav-links{display:flex;gap:20px;align-items:center}.nav-links a{text-decoration:none;color:#666;font-size:14px;padding:8px 16px;border-radius:8px}.nav-links a:hover{background:#f0f0f0}.nav-links .login-btn{background:#667eea;color:white}.nav-links .register-btn{border:1px solid #667eea;color:#667eea}.content{max-width:420px;margin:40px auto;padding:24px}.card{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}.logo{text-align:center;margin-bottom:24px}.logo-title{font-size:24px;font-weight:700;color:#1a1a2e}.logo-subtitle{font-size:14px;color:#666;margin-top:4px}.form-group{margin-bottom:20px}.form-label{display:block;font-size:14px;font-weight:600;color:#333;margin-bottom:8px}.form-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;background:#f8f9fa}.form-input:focus{outline:none;border-color:#667eea;background:white}.hint{font-size:12px;color:#999;margin-top:4px}.error-message{background:#fee2e2;color:#dc2626;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}.link-section{text-align:center;margin-top:16px;font-size:14px;color:#666}.link-section a{color:#667eea;text-decoration:none}</style></head><body><nav class='navbar'><div class='nav-brand'><a href='{{ url_for('index') }}'>TechBlog</a></div></nav><div class='content'>{% block content %}{% endblock %}</div></body></html>
