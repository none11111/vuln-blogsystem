{% extends 'base_simple.html' %}{% block title %}注册 - TechBlog{% endblock %}{% block content %}<div class='card'><div class='logo'><div class='logo-title'>注册</div><div class='logo-subtitle'>创建新账户</div></div><form method='post'><input type='hidden' name='csrf_token' value='{{ csrf_token }}'>{% if error %}<div class='error-message'>{{ error }}</div>{% endif %}<div class='form-group'><label class='form-label'>用户名</label><input type='text' name='username' class='form-input' placeholder='请输入用户名'></div><div class='form-group'><label class='form-label'>密码</label><input type='password' name='password' class='form-input' placeholder='请输入密码'></div><button type='submit' class='submit-btn'>注册</button></form><div class='link-section'>已有账号？<a href='{{ url_for('login') }}'>立即登录</a></div></div>{% endblock %}
