{% extends 'base.html' %}

{% block title %}发布内容 - TechBlog{% endblock %}

{% block content %}
    <div class="page-header">
        <h2>发布内容</h2>
        <p class="subtitle">支持文本、图片、视频、音频等多种内容形式</p>
    </div>
    
    {% if error %}
        <div class="alert alert-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            {{ error }}
        </div>
    {% endif %}
    
    <form method="post" enctype="multipart/form-data" class="post-form multimodal-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <!-- 内容类型选择 -->
        <div class="form-section">
            <label class="form-label">内容类型</label>
            <div class="media-type-selector">
                <label class="media-type-option">
                    <input type="radio" name="media_type" value="text" checked>
                    <div class="option-content">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        <span>文章</span>
                    </div>
                </label>
                <label class="media-type-option">
                    <input type="radio" name="media_type" value="image">
                    <div class="option-content">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>图片</span>
                    </div>
                </label>
                <label class="media-type-option">
                    <input type="radio" name="media_type" value="video">
                    <div class="option-content">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                        <span>视频</span>
                    </div>
                </label>
                <label class="media-type-option">
                    <input type="radio" name="media_type" value="audio">
                    <div class="option-content">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        <span>音频</span>
                    </div>
                </label>
            </div>
        </div>
        
        <!-- 标题 -->
        <div class="form-section">
            <label class="form-label" for="title">标题</label>
            <input type="text" id="title" name="title" maxlength="200" required placeholder="请输入标题..." class="form-input">
        </div>
        
        <!-- 媒体上传区域 -->
        <div class="form-section media-upload-section" id="media-upload-section" style="display: none;">
            <label class="form-label">媒体文件</label>
            <div class="media-upload-area" id="drop-zone">
                <input type="file" name="media_file" id="media-file" accept="image/*,video/*,audio/*">
                <div class="upload-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>点击或拖拽文件到此处上传</p>
                    <span class="upload-hint">支持图片(jpg/png/gif)、视频(mp4/webm)、音频(mp3/wav)</span>
                </div>
                <div class="file-preview" id="file-preview" style="display: none;">
                    <img id="image-preview" src="" alt="预览" style="display: none;">
                    <video id="video-preview" controls style="display: none;"></video>
                    <audio id="audio-preview" controls style="display: none;"></audio>
                    <div id="file-info"></div>
                    <button type="button" class="remove-file" onclick="removeFile()">移除文件</button>
                </div>
            </div>
        </div>
        
        <!-- 内容 -->
        <div class="form-section">
            <label class="form-label" for="content">内容描述</label>
            <textarea id="content" name="content" rows="10" required placeholder="请输入内容描述..." class="form-textarea"></textarea>
        </div>
        
        <!-- 分类和标签 -->
        <div class="form-row">
            <div class="form-section half">
                <label class="form-label" for="category">分类</label>
                <select id="category" name="category" class="form-select">
                    <option value="技术分享">技术分享</option>
                    <option value="前端开发">前端开发</option>
                    <option value="后端技术">后端技术</option>
                    <option value="数据库">数据库</option>
                    <option value="算法">算法</option>
                    <option value="安全">安全</option>
                    <option value="生活随笔">生活随笔</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-section half">
                <label class="form-label" for="tags">标签</label>
                <input type="text" id="tags" name="tags" placeholder="多个标签用逗号分隔" class="form-input">
            </div>
        </div>
        
        <!-- 提交按钮 -->
        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"></path>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                发布内容
            </button>
        </div>
    </form>
    
    <script>
        // 媒体类型选择
        const mediaTypeInputs = document.querySelectorAll('input[name="media_type"]');
        const mediaUploadSection = document.getElementById('media-upload-section');
        const mediaFileInput = document.getElementById('media-file');
        
        function updateMediaUpload() {
            const selectedType = document.querySelector('input[name="media_type"]:checked').value;
            if (selectedType === 'text') {
                mediaUploadSection.style.display = 'none';
            } else {
                mediaUploadSection.style.display = 'block';
                // 更新接受的文件类型
                const acceptTypes = {
                    'image': 'image/*',
                    'video': 'video/*',
                    'audio': 'audio/*'
                };
                mediaFileInput.accept = acceptTypes[selectedType] || '*';
            }
        }
        
        mediaTypeInputs.forEach(input => {
            input.addEventListener('change', updateMediaUpload);
        });
        
        // 文件预览
        mediaFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const preview = document.getElementById('file-preview');
            const placeholder = document.querySelector('.upload-placeholder');
            const imagePreview = document.getElementById('image-preview');
            const videoPreview = document.getElementById('video-preview');
            const audioPreview = document.getElementById('audio-preview');
            const fileInfo = document.getElementById('file-info');
            
            // 隐藏所有预览
            imagePreview.style.display = 'none';
            videoPreview.style.display = 'none';
            audioPreview.style.display = 'none';
            
            // 显示文件信息
            const size = (file.size / 1024 / 1024).toFixed(2);
            fileInfo.innerHTML = `<strong>${file.name}</strong> (${size} MB)`;
            
            // 根据文件类型显示预览
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                const url = URL.createObjectURL(file);
                videoPreview.src = url;
                videoPreview.style.display = 'block';
            } else if (file.type.startsWith('audio/')) {
                const url = URL.createObjectURL(file);
                audioPreview.src = url;
                audioPreview.style.display = 'block';
            }
            
            preview.style.display = 'block';
            placeholder.style.display = 'none';
        });
        
        function removeFile() {
            mediaFileInput.value = '';
            document.getElementById('file-preview').style.display = 'none';
            document.querySelector('.upload-placeholder').style.display = 'block';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('video-preview').style.display = 'none';
            document.getElementById('audio-preview').style.display = 'none';
        }
        
        // 拖拽上传
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                mediaFileInput.files = files;
                mediaFileInput.dispatchEvent(new Event('change'));
            }
        });
    </script>
{% endblock %}
