{% extends 'base_simple.html' %}{% block title %}登录 - TechBlog{% endblock %}{% block content %}<div class='card'><div class='logo'><div class='logo-title'>登录</div><div class='logo-subtitle'>登录您的账户</div></div><form method='post'><input type='hidden' name='csrf_token' value='{{ csrf_token }}'>{% if error %}<div class='error-message'>{{ error }}</div>{% endif %}<div class='form-group'><label class='form-label'>用户名</label><input type='text' name='username' class='form-input' required autofocus placeholder='请输入用户名'></div><div class='form-group'><label class='form-label'>密码</label><input type='password' name='password' class='form-input' required placeholder='请输入密码'></div><button type='submit' class='submit-btn'>登录</button></form><div class='link-section'>还没有账号？<a href='{{ url_for('register') }}'>立即注册</a></div></div>{% endblock %}
