{% extends 'base.html' %}

{% block title %}编辑文章 - 个人博客{% endblock %}

{% block content %}
    <h2>编辑文章</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label>标题:</label>
            <input type="text" name="title" maxlength="200" value="{{ post['title'] }}" required>
        </div>
        <div>
            <label>内容:</label>
            <textarea name="content" rows="15" required>{{ post['content'] }}</textarea>
        </div>
        <div>
            <button type="submit">保存修改</button>
        </div>
    </form>
{% endblock %}
